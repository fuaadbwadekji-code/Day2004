<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0B0F" />
    <title>DAY//2004</title>
    <style>
      html, body, #root { height: 100%; margin: 0; }
      #boot-msg { padding: 20px; white-space: pre-wrap; word-break: break-word; font-family: monospace; font-size: 13px; line-height: 1.5; color: #fff; background: #0B0B0F; }
    </style>
  </head>
  <body>
    <div id="root"><div id="boot-msg">Loading DAY//2004…</div></div>
    <script>
      window.addEventListener("error", function (e) {
        var el = document.getElementById("boot-msg");
        if (el) {
          el.textContent =
            "⚠️ Error loading the app:\n\n" +
            (e.message || e) +
            (e.filename ? ("\n\nFile: " + e.filename + ":" + e.lineno) : "");
        }
      });
      window.addEventListener("unhandledrejection", function (e) {
        var el = document.getElementById("boot-msg");
        if (el) {
          el.textContent =
            "⚠️ Error loading the app:\n\n" +
            (e.reason && e.reason.message ? e.reason.message : String(e.reason));
        }
      });
    </script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
