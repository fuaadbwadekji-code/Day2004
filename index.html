function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const todayISO = () => new Date().toISOString().slice(0, 10);

const dayLabel = (iso) => {
  const d = new Date(iso + "T00:00:00");
  return d
    .toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })
    .toUpperCase();
};

const shortDay = (iso) => {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "short" })[0];
};

function useLiveWeather() {
  const [state, setState] = useState({ temp: null, status: "loading" });

  useEffect(() => {
    let cancelled = false;
    if (!("geolocation" in navigator)) {
      setState({ temp: null, status: "unsupported" });
      return;
    }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        try {
          const { latitude, longitude } = pos.coords;
          const res = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`
          );
          const data = await res.json();
          if (cancelled) return;
          const temp = data?.current_weather?.temperature;
          if (typeof temp === "number") {
            setState({ temp: Math.round(temp), status: "ok" });
          } else {
            setState({ temp: null, status: "error" });
          }
        } catch (e) {
          if (!cancelled) setState({ temp: null, status: "error" });
        }
      },
      () => {
        if (!cancelled) setState({ temp: null, status: "denied" });
      },
      { enableHighAccuracy: false, timeout: 10000, maximumAge: 10 * 60 * 1000 }
    );
    return () => {
      cancelled = true;
    };
  }, []);

  return state;
}

function sceneGradientFallback(s, fallbackKey) {
  return {
    backgroundImage: SCENE_GRADIENTS[fallbackKey || s.id] || SCENE_GRADIENTS.work,

  };

function completion(scene) {
  const total = scene.tasks.length;
  const done = scene.tasks.filter((t) => t.done).length;
  return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
}

// called when a new day starts: finished tasks are cleared out, unfinished ones carry over
function clearCompletedTasks(scenes) {
  return scenes.map((s) => ({ ...s, tasks: s.tasks.filter((t) => !t.done) }));
}

/* ---------------- storage helpers ---------------- */

/* ---------------- storage helpers ----------------
   Works in two environments automatically:
   1) Inside a Claude artifact — uses window.storage (Anthropic's artifact storage)
   2) Hosted for real (GitHub Pages, Netlify, etc.) — window.storage won't exist there,
      so it falls back to the browser's own localStorage, which DOES persist normally
      on a real hosted site (per browser/device — not synced across devices, since
      that would require a real backend server).
------------------------------------------------- */

function hasArtifactStorage() {
  return typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
}

async function loadKey(key, fallback) {
  try {
    if (hasArtifactStorage()) {
      const r = await window.storage.get(key);
      if (r && r.value) return JSON.parse(r.value);
      return fallback;
    }
    const raw = window.localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    /* not found or storage unavailable */
  }
  return fallback;
}
async function saveKey(key, value) {
  try {
    if (hasArtifactStorage()) {
      await window.storage.set(key, JSON.stringify(value));
      return;
    }
    window.localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    /* ignore — e.g. storage quota exceeded */
  }
}
async function deleteKey(key) {
  try {
    if (hasArtifactStorage() && window.storage.delete) {
      await window.storage.delete(key);
      return;
    }
    window.localStorage.removeItem(key);
  } catch (e) {
    /* ignore */
  }
}

const MAX_PERSISTABLE_TRACK_BYTES = 4.5 * 1024 * 1024; // stay safely under the 5MB per-key storage limit

async function loadPlaylistFromStorage() {
  const meta = await loadKey("day2004-playlist-meta", []);
  const tracks = [];
  for (const m of meta) {
    const url = await loadKey("day2004-track-" + m.id, null);
    if (url) tracks.push({ id: m.id, name: m.name, url, persisted: true });
  }
  return tracks;
}

async function savePlaylistMeta(playlist) {
  const meta = playlist.filter((t) => t.persisted).map((t) => ({ id: t.id, name: t.name }));
  await saveKey("day2004-playlist-meta", meta);
}

function greetingForHour(h) {
  if (h >= 5 && h < 12) return "good morning";
  if (h >= 12 && h < 17) return "good afternoon";
  if (h >= 17 && h < 21) return "good evening";
  return "good night";
}

function useGreeting() {
  const [greeting, setGreeting] = useState(greetingForHour(new Date().getHours()));
  useEffect(() => {
    const id = setInterval(() => {
      setGreeting(greetingForHour(new Date().getHours()));
    }, 60 * 1000); // recheck every minute — real device time, not a fixed value
    return () => clearInterval(id);
  }, []);
  return greeting;
}

const TRACK_DURATION = 222; // 3:42, seconds — used only for the decorative demo simulation

function MusicPlayer({ playlist, addTracks, removeTrack }) {
  const [currentIndex, setCurrentIndex] = useState(0);
  const [playing, setPlaying] = useState(true);
  const [elapsed, setElapsed] = useState(78);
  const [duration, setDuration] = useState(TRACK_DURATION);
  const [showList, setShowList] = useState(false);
  const audioRef = useRef(null);
  const fileInputRef = useRef(null);

  const hasRealTrack = playlist.length > 0;
  const safeIndex = Math.min(currentIndex, Math.max(0, playlist.length - 1));
  const currentTrack = hasRealTrack ? playlist[safeIndex] : null;

  // demo simulation only runs when there's no real track loaded
  useEffect(() => {
    if (hasRealTrack || !playing) return;
    const id = setInterval(() => setElapsed((e) => (e + 1) % TRACK_DURATION), 1000);
    return () => clearInterval(id);
  }, [playing, hasRealTrack]);

  useEffect(() => {
    if (!hasRealTrack) return;
    const audio = audioRef.current;
    if (!audio || !currentTrack) return;
    if (audio.src !== currentTrack.url) {
      audio.src = currentTrack.url;
    }
    if (playing) audio.play().catch(() => {});
    else audio.pause();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [safeIndex, currentTrack?.url]);

  const togglePlay = () => {
    if (hasRealTrack) {
      const audio = audioRef.current;
      if (!audio) return;
      if (playing) audio.pause();
      else audio.play().catch(() => {});
    }
    setPlaying((p) => !p);
  };

  const goToIndex = (i) => {
    setCurrentIndex(i);
    setPlaying(true);
    setShowList(false);
  };

  const skip = (delta) => {
    if (hasRealTrack) {
      goToIndex((safeIndex + delta + playlist.length) % playlist.length);
    } else {
      setElapsed((e) => (e + delta * 10 + TRACK_DURATION) % TRACK_DURATION);
    }
  };

  const onAddFiles = async (fileList) => {
    const wasEmpty = playlist.length === 0;
    await addTracks(fileList);
    if (wasEmpty) {
      setCurrentIndex(0);
      setPlaying(true);
    }
  };

  const onRemove = (id) => {
    const idx = playlist.findIndex((t) => t.id === id);
    removeTrack(id);
    if (idx === safeIndex) setCurrentIndex(0);
  };

  const progress = hasRealTrack && duration ? (elapsed / duration) * 100 : (elapsed / TRACK_DURATION) * 100;
  const trackName = currentTrack ? currentTrack.name : "The Killers — Mr. Brightside";

  return (
    <div style={{ padding: "0 20px 6px" }}>
      <input
        ref={fileInputRef}
        type="file"
        accept="audio/*"
        multiple
        style={{ display: "none" }}
        onChange={(e) => {
          onAddFiles(e.target.files);
          e.target.value = "";
        }}
      />
      {hasRealTrack && (
        <audio
          ref={audioRef}
          onTimeUpdate={(e) => setElapsed(e.target.currentTime || 0)}
          onLoadedMetadata={(e) => setDuration(e.target.duration || TRACK_DURATION)}
          onEnded={() => skip(1)}
        />
      )}

      <Card style={{ padding: "12px 16px", display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ flex: 1, minWidth: 0 }} onClick={() => setShowList((s) => !s)}>
          <div style={{ fontFamily: FONT_SANS, fontSize: fs(9), letterSpacing: ls(1), color: COLORS.textSecondary }}>
            PLAYING NOW
          </div>
          <div
            style={{
              fontFamily: FONT_SANS,
              fontSize: fs(12),
              color: COLORS.text,
              marginTop: 2,
              whiteSpace: "nowrap",
              overflow: "hidden",
              textOverflow: "ellipsis",
            }}
          >
            {trackName}
          </div>
        </div>
        <button onClick={() => fileInputRef.current?.click()} style={{ ...iconBtnStyle, padding: 4 }}>
          <Plus size={16} color={COLORS.accent} />
        </button>
        <Equalizer active={playing} />
      </Card>

      <div style={{ padding: "6px 2px 0" }}>
        <div
          style={{
            height: 4,
            borderRadius: 2,
            background: "rgba(255,255,255,0.08)",
            overflow: "hidden",
          }}
        >
          <div
            style={{
              width: `${Math.min(100, Math.max(0, progress))}%`,
              height: "100%",
              background: COLORS.accent,
              transition: hasRealTrack ? "none" : "width 900ms linear",
            }}
          />
        </div>
      </div>

      <div
        style={{
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          gap: 40,
          padding: "14px 0 4px",
        }}
      >
        <button style={{ ...iconBtnStyle, padding: 0 }} onClick={() => skip(-1)}>
          <SkipBack size={22} color={COLORS.text} fill={COLORS.text} />
        </button>
        <button style={{ ...iconBtnStyle, padding: 0 }} onClick={togglePlay}>
          {playing ? (
            <Pause size={26} color={COLORS.text} fill={COLORS.text} />
          ) : (
            <Play size={26} color={COLORS.text} fill={COLORS.text} />
          )}
        </button>
        <button style={{ ...iconBtnStyle, padding: 0 }} onClick={() => skip(1)}>
          <SkipForward size={22} color={COLORS.text} fill={COLORS.text} />
        </button>
      </div>

      {showList && (
        <Card style={{ padding: 10, marginTop: 4 }}>
          {playlist.length === 0 && (
            <div
              style={{
                fontFamily: FONT_SANS,
                fontSize: fs(11),
                color: COLORS.textSecondary,
                padding: "8px 4px",
              }}
            >
              No songs added yet — tap + to add your own.
            </div>
          )}
          {playlist.map((t, i) => (
            <div
              key={t.id}
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                padding: "8px 6px",
                borderRadius: br(8),
                background: i === safeIndex ? "rgba(200,183,158,0.12)" : "transparent",
              }}
            >
              <span
                onClick={() => goToIndex(i)}
                style={{
                  flex: 1,
                  fontFamily: FONT_SANS,
                  fontSize: fs(12),
                  color: i === safeIndex ? COLORS.accent : COLORS.text,
                  whiteSpace: "nowrap",
                  overflow: "hidden",
                  textOverflow: "ellipsis",
                  cursor: "pointer",
                }}
              >
                {t.name}
                {!t.persisted && (
                  <span style={{ color: COLORS.textSecondary, fontSize: fs(10) }}> (session only)</span>
                )}
              </span>
              <button onClick={() => onRemove(t.id)} style={{ ...iconBtnStyle, padding: 2 }}>
                <X size={14} color={COLORS.textSecondary} />
              </button>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

function TaskRow({ task, onToggle, onStar, onDelete, onEdit }) {
  const [dx, setDx] = useState(0);
  const [open, setOpen] = useState(false);
  const start = useRef({ x: 0, y: 0 });
  const dragging = useRef(false);
  const axis = useRef(null); // 'x' | 'y' | null
  const startDx = useRef(0);

  const onStart = (x, y) => {
    start.current = { x, y };
    startDx.current = dx;
    dragging.current = true;
    axis.current = null;
  };

  const onMove = (x, y) => {
    if (!dragging.current) return;
    const deltaX = x - start.current.x;
    const deltaY = y - start.current.y;

    if (axis.current === null) {
      if (Math.abs(deltaX) < 8 && Math.abs(deltaY) < 8) return; // not enough movement to decide yet
      axis.current = Math.abs(deltaX) > Math.abs(deltaY) * 1.4 ? "x" : "y";
    }
    if (axis.current !== "x") return; // vertical scroll intent — leave it to the page, don't move the row

    // heavier, slower-feeling drag (damped, not 1:1 with the finger)
    const damped = deltaX * 0.55;
    let next = startDx.current + damped;
    if (next > 0) next *= 0.3;
    if (next < -80) next = -80 + (next + 80) * 0.2;
    setDx(Math.max(-100, Math.min(16, next)));
  };

  const onEnd = () => {
    dragging.current = false;
    if (axis.current === "x") {
      setDx((d) => {
        const shouldOpen = d < -44;
        setOpen(shouldOpen);
        return shouldOpen ? -80 : 0;
      });
    }
    axis.current = null;
  };

  return (
    <div style={{ position: "relative", overflow: "hidden", borderRadius: 10 }}>
      {open && (
        <div
          style={{
            position: "absolute",
            right: 0,
            top: 0,
            bottom: 0,
            width: 80,
            background: COLORS.danger,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
          }}
          onClick={() => onDelete(task.id)}
        >
          <Trash2 size={16} color="#fff" />
        </div>
      )}
      <div
        onTouchStart={(e) => onStart(e.touches[0].clientX, e.touches[0].clientY)}
        onTouchMove={(e) => onMove(e.touches[0].clientX, e.touches[0].clientY)}
        onTouchEnd={onEnd}
        onMouseDown={(e) => onStart(e.clientX, e.clientY)}
        onMouseMove={(e) => e.buttons === 1 && onMove(e.clientX, e.clientY)}
        onMouseUp={onEnd}
        onMouseLeave={() => dragging.current && onEnd()}
        style={{
          touchAction: "pan-y",
          transform: `translateX(${dx}px)`,
          transition: dragging.current
            ? "none"
            : "transform 480ms cubic-bezier(0.25, 1, 0.3, 1), background 200ms ease, border-color 200ms ease",
          background: task.image
            ? `linear-gradient(90deg, rgba(11,11,15,0.78) 0%, rgba(11,11,15,0.55) 100%), url(${task.image})`
            : task.star

        }}
      >

            background: task.done ? COLORS.accent : "transparent",

function useKeyboardInset() {
  const [inset, setInset] = useState(0);
  useEffect(() => {
    const vv = window.visualViewport;
    if (!vv) return;
    const handler = () => {
      const gap = window.innerHeight - vv.height;
      setInset(Math.max(0, Math.round(gap)));
    };
    handler();
    vv.addEventListener("resize", handler);
    vv.addEventListener("scroll", handler);
    return () => {
      vv.removeEventListener("resize", handler);
      vv.removeEventListener("scroll", handler);
    };
  }, []);
  return inset;
}

const PERIODS = ["THIS WEEK", "THIS MONTH", "ALL TIME"];

function StatsScreen({ scenes, history }) {
  const [periodIdx, setPeriodIdx] = useState(0);
  const totalTasks = scenes.reduce((a, s) => a + s.tasks.length, 0);
  const doneTasks = scenes.reduce((a, s) => a + s.tasks.filter((t) => t.done).length, 0);
  const pct = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;

  const top = scenes.reduce((best, s) => {
    const c = completion(s);
    return !best || c.pct > best.pct ? { name: s.name, pct: c.pct } : best;
  }, null);

  const streak = history.filter((h) => h.pct >= 50).length;

  const chartData = history.map((h) => ({
    name: shortDay(h.date),

        <Card style={{ padding: 18, marginBottom: 12 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
            <span style={{ fontFamily: FONT_PIXEL, fontWeight: 700, fontSize: fs(42), color: COLORS.text }}>
              {streak}
            </span>
            <span style={{ fontFamily: FONT_MONO, fontSize: fs(13), color: COLORS.text, letterSpacing: 1 }}>
              DAYS SEASON
            </span>
          </div>
          <div style={{ fontFamily: FONT_SANS, fontSize: fs(12), color: COLORS.textSecondary, marginTop: 2 }}>
            keep going.
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 18 }}>

              <span

                  width: 26,
                  textAlign: "center",

function weekdayName(iso) {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "long" }).toUpperCase();
}
function monthDayYear(iso) {
  const d = new Date(iso + "T00:00:00");
  return d
    .toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })
    .toUpperCase();
}

function JournalScreen({
  scenes,
  journal,
  setJournal,
  history,
  selectedDate,
  setSelectedDate,
  appSettings,
  setAppSettings,
}) {
  const entry = journal[selectedDate] || { notes: "" };
  const [notes, setNotes] = useState(entry.notes);
  const debounceRef = useRef(null);

  useEffect(() => {
    setNotes(entry.notes);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [selectedDate]);

  const totalTasks = scenes.reduce((a, s) => a + s.tasks.length, 0);
  const doneTasks = scenes.reduce((a, s) => a + s.tasks.filter((t) => t.done).length, 0);
  const scenesCompleted = scenes.filter((s) => s.tasks.length && s.tasks.every((t) => t.done)).length;

  const updateNotes = (val) => {
    setNotes(val);
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      setJournal((j) => ({ ...j, [selectedDate]: { ...(j[selectedDate] || {}), notes: val } }));
    }, 500);
  };

  const pctForDate = (dateIso) => {
    if (dateIso === todayISO()) return totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;
    const h = history.find((x) => x.date === dateIso);
    return h ? h.pct : 0;
  };
  const ratingForDate = (dateIso) => (pctForDate(dateIso) / 100) * 5;
  const autoRating = ratingForDate(selectedDate);

  const pastDays = Object.keys(journal)
    .filter((d) => d !== selectedDate)
    .sort((a, b) => (a < b ? 1 : -1))
    .slice(0, 10);

  return (
    <div>
      <ScreenHeader title="JOURNAL" />
      <div style={{ padding: "6px 20px" }}>
        <Card style={{ padding: 16, marginBottom: 14 }}>
          <div style={{ fontFamily: FONT_SANS, fontSize: fs(11), color: COLORS.textSecondary, letterSpacing: 1 }}>
            DAY SUMMARY
          </div>

          <div
            style={{
              height: 220,
              marginTop: 12,
              marginBottom: 4,
              borderRadius: br(14),
              overflow: "hidden",
              position: "relative",
              ...(appSettings.coverImage ? {} : { backgroundImage: SCENE_GRADIENTS.home, backgroundSize: "cover" }),
              display: "flex",
              alignItems: "flex-end",
              padding: 16,
            }}
          >
            {appSettings.coverImage && (
              <ImageLayer
                image={appSettings.coverImage}
                position={appSettings.coverPosition}
                zoom={appSettings.coverZoom}
                gradient="linear-gradient(180deg, rgba(11,11,15,0) 30%, rgba(11,11,15,0.92) 100%)"
              />
            )}
            <div style={{ position: "relative" }}>
              <div
                style={{
                  fontFamily: FONT_PIXEL,
                  fontWeight: 700,
                  fontSize: fs(26),
                  color: COLORS.text,
                  textShadow: "0 0 6px rgba(255,255,255,0.2)",
                }}
              >
                {weekdayName(selectedDate)}
              </div>
              <div
                style={{
                  fontFamily: FONT_PIXEL,
                  fontSize: fs(15),
                  color: COLORS.textSecondary,
                  marginTop: 4,
                }}
              >
                {monthDayYear(selectedDate)}

          <div style={{ marginTop: 6 }}>

              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>

function CoverImagePreviewModal({ file, initialPosition, initialZoom, onConfirm, onCancel }) {
  const [dataUrl, setDataUrl] = useState(null);
  const [pos, setPos] = useState(() => {
    const parts = (initialPosition || "50% 50%").replace(/%/g, "").trim().split(/\s+/).map(Number);
    return { x: isNaN(parts[0]) ? 50 : parts[0], y: isNaN(parts[1]) ? 50 : parts[1] };
  });
  const [zoom, setZoom] = useState(initialZoom || 1);
  const boxRef = useRef(null);
  const pointers = useRef(new Map()); // pointerId -> {x,y}
  const dragStart = useRef(null); // {x,y,posX,posY}
  const pinchStart = useRef(null); // {dist, zoom}

  useEffect(() => {
    let cancelled = false;
    readFileAsDataURL(file).then((d) => {
      if (!cancelled) setDataUrl(d);
    });
    return () => {
      cancelled = true;
    };
  }, [file]);

  const clampZoom = (z) => Math.min(4, Math.max(1, z));

  const movePosByPixels = (dxPx, dyPx) => {
    const rect = boxRef.current.getBoundingClientRect();
    // moving the finger right should reveal more of the image's left side -> position % decreases
    setPos((p) => ({
      x: Math.min(100, Math.max(0, p.x - (dxPx / rect.width) * 100)),
      y: Math.min(100, Math.max(0, p.y - (dyPx / rect.height) * 100)),
    }));
  };

  const pointerDist = () => {
    const pts = Array.from(pointers.current.values());
    if (pts.length < 2) return 0;
    return Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
  };

  const onPointerDown = (e) => {
    boxRef.current?.setPointerCapture?.(e.pointerId);
    pointers.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.current.size === 1) {
      dragStart.current = { x: e.clientX, y: e.clientY };
    } else if (pointers.current.size === 2) {
      pinchStart.current = { dist: pointerDist(), zoom };
      dragStart.current = null;
    }
  };

  const onPointerMove = (e) => {
    if (!pointers.current.has(e.pointerId)) return;
    pointers.current.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (pointers.current.size >= 2 && pinchStart.current) {
      const newDist = pointerDist();
      if (pinchStart.current.dist > 0) {
        const nextZoom = clampZoom(pinchStart.current.zoom * (newDist / pinchStart.current.dist));
        setZoom(nextZoom);
      }
    } else if (pointers.current.size === 1 && dragStart.current) {
      const dx = e.clientX - dragStart.current.x;
      const dy = e.clientY - dragStart.current.y;
      dragStart.current = { x: e.clientX, y: e.clientY };
      movePosByPixels(dx, dy);
    }
  };

  const onPointerUp = (e) => {
    pointers.current.delete(e.pointerId);
    if (pointers.current.size === 1) {
      const [remaining] = pointers.current.values();
      dragStart.current = { x: remaining.x, y: remaining.y };
      pinchStart.current = null;
    } else if (pointers.current.size === 0) {
      dragStart.current = null;
      pinchStart.current = null;
    }
  };

  const onWheel = (e) => {
    e.preventDefault();
    setZoom((z) => clampZoom(z - e.deltaY * 0.0015));
  };

  return (
    <div
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(0,0,0,0.85)",
        zIndex: 30,
        display: "flex",
        flexDirection: "column",
        justifyContent: "center",
        padding: 24,
      }}
    >
      <div
        style={{
          fontFamily: FONT_MONO,
          fontSize: fs(12),
          letterSpacing: ls(1),
          color: COLORS.textSecondary,
          marginBottom: 12,
          textAlign: "center",
        }}
      >
        DRAG TO MOVE · PINCH OR SCROLL TO ZOOM
      </div>
      <div
        ref={boxRef}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerUp}
        onWheel={onWheel}
        style={{
          position: "relative",
          height: 220,
          borderRadius: br(16),
          overflow: "hidden",
          border: `1px solid ${COLORS.cardBorder}`,
          backgroundColor: COLORS.card,
          cursor: "grab",
          touchAction: "none",
          userSelect: "none",
        }}
      >
        {dataUrl ? (
          <div
            style={{
              position: "absolute",
              inset: 0,
              backgroundImage: `url(${dataUrl})`,
              backgroundSize: "cover",
              backgroundPosition: `${pos.x}% ${pos.y}%`,
              transform: `scale(${zoom})`,
              transformOrigin: "center center",
              pointerEvents: "none",
            }}
          />
        ) : (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%" }}>
            <span style={{ fontFamily: FONT_SANS, fontSize: fs(12), color: COLORS.textSecondary }}>
              Loading…
            </span>
          </div>
        )}
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 14 }}>
        <span style={{ fontFamily: FONT_SANS, fontSize: fs(11), color: COLORS.textSecondary }}>
          zoom
        </span>
        <input
          type="range"
          min={1}
          max={4}
          step={0.05}
          value={zoom}
          onChange={(e) => setZoom(parseFloat(e.target.value))}
          style={{ flex: 1, accentColor: COLORS.accent }}
        />
      </div>

      <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
        <button
          onClick={onCancel}
          style={{
            flex: 1,
            padding: "13px 0",
            background: "transparent",
            border: `1px solid ${COLORS.cardBorder}`,
            borderRadius: br(12),
            color: COLORS.textSecondary,
            fontFamily: FONT_SANS,
            fontSize: fs(13),
            cursor: "pointer",
          }}
        >
          Cancel
        </button>
        <button
          onClick={() => dataUrl && onConfirm(dataUrl, `${pos.x}% ${pos.y}%`, zoom)}
          style={{
            flex: 1,
            padding: "13px 0",
            background: COLORS.accent,
            border: "none",
            borderRadius: br(12),
            color: "#0B0B0F",
            fontFamily: FONT_SANS,
            fontWeight: 600,
            fontSize: fs(13),
            cursor: "pointer",
          }}
        >
          Use Photo
        </button>
      </div>
    </div>
  );
}

function randomFromArr(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

const REACTION_EMOJIS = ["❤️", "🔥", "😂", "👏", "😢"];
function pickReactionEmoji() {
  const r = Math.random();
  if (r < 0.55) return "❤️";
  if (r < 0.72) return "🔥";
  if (r < 0.86) return "😂";
  if (r < 0.95) return "👏";
  return "😢";
}

function weightedSample(items, weightFn, count) {
  const pool = [...items];
  const chosen = [];
  for (let i = 0; i < count && pool.length; i++) {
    const weights = pool.map(weightFn);
    const total = weights.reduce((a, b) => a + b, 0);
    if (total <= 0) {
      chosen.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
      continue;
    }
    let r = Math.random() * total;
    let idx = 0;
    for (; idx < pool.length; idx++) {
      r -= weights[idx];
      if (r <= 0) break;
    }
    chosen.push(pool.splice(Math.min(idx, pool.length - 1), 1)[0]);
  }
  return chosen;
}

function generateCharacterPostContent(character, atDate) {
  const isFr = character.language === "fr";
  const mood = randomMood();
  const moodTails = isFr ? MOOD_TAILS_FR : MOOD_TAILS;
  const interestTemplates = isFr ? INTEREST_TEMPLATES_FR : INTEREST_TEMPLATES;
  const periodActivities = isFr ? PERIOD_ACTIVITIES_FR : PERIOD_ACTIVITIES;
  const personalityTemplates = isFr ? PERSONALITY_TEMPLATES_FR : PERSONALITY_TEMPLATES;

  if (Math.random() < 0.5 && interestTemplates[character.interest]) {
    const base = randomFromArr(interestTemplates[character.interest]);
    if (Math.random() < 0.4) return `${base} ${MOOD_EMOJI[mood]} ${randomFromArr(moodTails[mood])}`;
    return base;
  }
  const period = periodForHour(atDate.getHours());
  const activity = randomFromArr(periodActivities[period]);
  const templateFn = personalityTemplates[character.personality][period];
  const base = templateFn(activity);
  if (Math.random() < 0.55) {
    return `${base} ${MOOD_EMOJI[mood]} ${randomFromArr(moodTails[mood])}`;
  }
  return base;
}

function matchTopicReplies(text) {
  const lower = (text || "").toLowerCase();
  const matched = TOPIC_REACTIONS.filter((t) => t.kw.some((k) => lower.includes(k)));
  if (!matched.length) return null;
  const pool = matched.flatMap((t) => t.r);
  return pool;
}

function generateCommentContent(character, contextText) {
  const isFr = character.language === "fr";
  const topicPool = contextText ? matchTopicReplies(contextText) : null;
  if (topicPool && Math.random() < 0.85) return randomFromArr(topicPool);
  return randomFromArr((isFr ? COMMENT_TEMPLATES_FR : COMMENT_TEMPLATES)[character.personality]);
}

function createCharacterPost(character, atDate) {
  return {

    time: atDate.toISOString(),
    content: generateCharacterPostContent(character, atDate),
    userReaction: null,

}

function pickPostingCharacters(count) {
  return weightedSample(COMMUNITY_CHARACTERS, (c) => c.activity, count);
}

function pickReactorCharacters(count, preferId) {
  let pool = COMMUNITY_CHARACTERS;
  const preferred = preferId ? COMMUNITY_CHARACTERS.find((c) => c.id === preferId) : null;
  const rest = weightedSample(
    preferred ? COMMUNITY_CHARACTERS.filter((c) => c.id !== preferId) : COMMUNITY_CHARACTERS,
    (c) => (c.closeness === "close" ? 3 : c.closeness === "friend" ? 2 : 1),
    preferred ? count - 1 : count
  );
  return preferred ? [preferred, ...rest] : rest;
}

// one simulated interaction pass over existing posts (likes/comments from characters)
// keeps the feed bounded so it never grows large enough to blow past storage limits,
// while still preserving a long, real scroll-back history
const COMMUNITY_POST_CAP = 600;

function simulateInteractions(posts, atDate) {
  const notifications = [];
  if (!posts.length) return { posts, notifications };
  const recentIds = posts.slice(0, 15).map((p) => p.id);
  const interactionCount = 1 + Math.floor(Math.random() * 3);
  let updated = posts;
  for (let i = 0; i < interactionCount; i++) {
    const targetId = randomFromArr(recentIds);
    const target = updated.find((p) => p.id === targetId);
    if (!target) continue;
    const eligible = COMMUNITY_CHARACTERS.filter((c) => c.id !== target.authorId);
    const actor = randomFromArr(eligible);
    const isLike = Math.random() < 0.65;
    updated = updated.map((p) => {
      if (p.id !== target.id) return p;
      if (isLike) {
        if (p.reactions.some((r) => r.charId === actor.id)) return p;
        return { ...p, reactions: [...p.reactions, { charId: actor.id, emoji: pickReactionEmoji() }] };
      }
      const comment = {
        id: uid(),
        authorId: actor.id,
        content: generateCommentContent(actor, target.content),
        time: atDate.toISOString(),
      };
      return { ...p, comments: [...p.comments, comment] };
    });
    if (target.authorId === "user") {
      notifications.push({
        id: uid(),
        type: isLike ? "like" : "comment",
        charId: actor.id,
        postId: target.id,
        time: atDate.toISOString(),
        read: false,
      });
    }
  }
  return { posts: updated, notifications };
}

// one simulated "tick" of the whole community: maybe a new post + some interactions
function simulationTick(posts, atDate) {
  let nextPosts = posts;
  if (Math.random() < 0.6) {
    const chars = pickPostingCharacters(1 + (Math.random() < 0.3 ? 1 : 0));
    const created = chars.map((c) => createCharacterPost(c, atDate));
    nextPosts = [...created, ...nextPosts];
  }
  const { posts: afterInteract, notifications } = simulateInteractions(nextPosts, atDate);
  return { posts: afterInteract.slice(0, COMMUNITY_POST_CAP), notifications };
}

// simulate what would have happened while the app was closed/away
function catchUpCommunity(existingPosts, fromDate, toDate) {
  const elapsedMinutes = (toDate - fromDate) / 60000;
  if (elapsedMinutes < 2) return { posts: existingPosts, notifications: [] };
  const ticks = Math.min(20, Math.floor(elapsedMinutes / 8));
  let posts = existingPosts;
  let notifications = [];
  for (let i = 0; i < ticks; i++) {
    const tickTime = new Date(fromDate.getTime() + ((i + 1) / ticks) * (toDate - fromDate));
    const result = simulationTick(posts, tickTime);
    posts = result.posts;
    notifications = notifications.concat(result.notifications);
  }
  posts = [...posts].sort((a, b) => new Date(b.time) - new Date(a.time));
  return { posts, notifications };
}

function seedInitialCommunity(now) {
  const from = new Date(now.getTime() - 3 * 60 * 60 * 1000); // last 3 hours
  return catchUpCommunity([], from, now);
}

function buildWeeklySummaryPost(posts) {
  const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const recent = posts.filter((p) => new Date(p.time).getTime() >= weekAgo && p.authorId !== "system");
  if (!recent.length) return null;

  const scored = recent
    .map((p) => ({ p, score: p.reactions.length + p.comments.length }))
    .sort((a, b) => b.score - a.score);
  const top = scored[0]?.score > 0 ? scored[0].p : null;

  const commentCounts = {};
  recent.forEach((p) =>
    p.comments.forEach((c) => {
      if (c.authorId !== "user") commentCounts[c.authorId] = (commentCounts[c.authorId] || 0) + 1;
    })
  );
  let mostActiveId = null;
  let mostActiveCount = 0;
  Object.entries(commentCounts).forEach(([id, count]) => {
    if (count > mostActiveCount) {
      mostActiveCount = count;
      mostActiveId = id;
    }
  });

  const topAuthor = top ? getCharacterDisplay(top.authorId, {}) : null;
  const activeAuthor = mostActiveId ? getCharacterDisplay(mostActiveId, {}) : null;

  let content = "📊 this week in the community: ";
  const parts = [];
  if (topAuthor) parts.push(`${topAuthor.name}'s post got the most love this week`);
  if (activeAuthor) parts.push(`${activeAuthor.name} was the most active commenter 💬`);
  content += parts.length ? parts.join(", and ") : "a pretty quiet week — let's change that 👀";

  return {
    id: uid(),
    authorId: "system",
    time: new Date().toISOString(),
    content,
    userReaction: null,
    reactions: [],
    comments: [],
  };
}

function formatRelativeTime(iso) {
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.max(0, Math.floor(diffMs / 60000));
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function getCharacterDisplay(authorId, overrides) {
  if (authorId === "user") return { name: "You", color: COLORS.accent, photo: null, closeness: null };
  if (authorId === "system") return { name: "Weekly Recap", color: COLORS.accent, photo: null, closeness: null };
  const base = COMMUNITY_CHARACTERS.find((c) => c.id === authorId);
  const override = overrides?.[authorId];
  return {
    name: override?.name || base?.name || "Someone",
    color: base?.color || COLORS.accent,
    photo: override?.photo || null,
    position: override?.photoPosition || "50% 50%",
    zoom: override?.photoZoom || 1,
    closeness: base?.closeness || null,
  };
}

        <div style={{ marginTop: 12, borderTop: `1px solid ${COLORS.cardBorder}`, paddingTop: 10 }}>

                <CommentRow key={r.id} c={r} indented />

                  <Avatar name="You" color={COLORS.accent} size={22} />

                    autoFocus
                    value={commentText}
                    onChange={(e) => setCommentText(e.target.value)}
                    placeholder={`Reply…`}
                    style={{ ...inputStyle, height: 34, flex: 1 }}

                    onClick={() => submitComment(c.id)}

                      height: 34,
                      background: COLORS.accent,
                      border: "none",
                      borderRadius: br(10),
                      color: "#0B0B0F",
                      fontFamily: FONT_SANS,
                      fontWeight: 600,
                      fontSize: fs(11),
                      cursor: "pointer",
                      flexShrink: 0,
                    }}
                  >
                    Send
                  </button>
                </div>

            </div>

          {typingCharId && (
            <div style={{ fontFamily: FONT_SANS, fontSize: fs(11), color: COLORS.textSecondary, fontStyle: "italic", marginBottom: 8 }}>

function CharacterManager({ overrides, setOverrides, onClose }) {
  const fileInputRef = useRef(null);
  const [editingId, setEditingId] = useState(null);
  const [pendingPhotoFile, setPendingPhotoFile] = useState(null);

  const onPickPhoto = (e, id) => {
    const file = e.target.files?.[0];
    if (file) {
      setEditingId(id);
      setPendingPhotoFile(file);
    }
    e.target.value = "";
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 30, display: "flex", flexDirection: "column", padding: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <span style={{ fontFamily: FONT_MONO, fontSize: fs(13), color: COLORS.text, letterSpacing: 1 }}>
          EDIT PEOPLE
        </span>
        <button onClick={onClose} style={iconBtnStyle}>
          <X size={18} color={COLORS.textSecondary} />
        </button>
      </div>
      <input
        ref={fileInputRef}
        type="file"
        accept="image/*"
        style={{ display: "none" }}
        onChange={(e) => onPickPhoto(e, editingId)}
      />
      {pendingPhotoFile && (
        <CoverImagePreviewModal
          file={pendingPhotoFile}
          initialPosition={overrides?.[editingId]?.photoPosition}
          initialZoom={overrides?.[editingId]?.photoZoom}
          onCancel={() => setPendingPhotoFile(null)}
          onConfirm={(dataUrl, position, zoom) => {
            setOverrides((o) => ({
              ...o,
              [editingId]: { ...(o[editingId] || {}), photo: dataUrl, photoPosition: position, photoZoom: zoom },
            }));
            setPendingPhotoFile(null);
          }}
        />
      )}
      <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8 }}>
        {COMMUNITY_CHARACTERS.map((c) => {
          const display = getCharacterDisplay(c.id, overrides);
          return (
            <Card key={c.id} style={{ padding: 10, display: "flex", alignItems: "center", gap: 10 }}>
              <button
                onClick={() => {
                  setEditingId(c.id);
                  setTimeout(() => fileInputRef.current?.click(), 0);
                }}
                style={{ background: "none", border: "none", padding: 0, cursor: "pointer" }}
              >
                <Avatar name={display.name} color={display.color} photo={display.photo} position={display.position} zoom={display.zoom} size={40} />
              </button>
              <input
                value={display.name}
                onChange={(e) =>
                  setOverrides((o) => ({ ...o, [c.id]: { ...(o[c.id] || {}), name: e.target.value } }))
                }
                style={{ ...inputStyle, flex: 1, height: 38 }}
              />
            </Card>
          );
        })}
      </div>
    </div>
  );
}

function CommunitySection({ posts, notifications, overrides, setOverrides, onPost, onSetReaction, onAddComment, onMarkNotificationsRead, typingIndicators, onOpenSettings }) {
  const [draft, setDraft] = useState("");
  const [showNotifs, setShowNotifs] = useState(false);
  const [showManager, setShowManager] = useState(false);
  const [expandedPostId, setExpandedPostId] = useState(null);
  const [highlightedPostId, setHighlightedPostId] = useState(null);
  const unread = notifications.filter((n) => !n.read).length;

  const submitPost = () => {
    if (!draft.trim()) return;
    onPost(draft.trim());
    setDraft("");
  };

  const jumpToPost = (postId) => {
    setShowNotifs(false);
    setExpandedPostId(postId);
    setHighlightedPostId(postId);
    setTimeout(() => {
      document.getElementById(`community-post-${postId}`)?.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 80);
    setTimeout(() => setHighlightedPostId(null), 2200);
  };

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      <ScreenHeader
        title="COMMUNITY"
        left={
          <button onClick={onOpenSettings} style={iconBtnStyle}>
            <Settings size={17} color={COLORS.textSecondary} />
          </button>
        }
        right={
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <button onClick={() => setShowManager(true)} style={iconBtnStyle}>
              <Users size={17} color={COLORS.textSecondary} />
            </button>
            <button
              onClick={() => {
                setShowNotifs((s) => !s);
                if (!showNotifs) onMarkNotificationsRead();
              }}
              style={{ ...iconBtnStyle, position: "relative" }}
            >
              <Bell size={17} color={COLORS.text} />
              {unread > 0 && (
                <span
                  style={{
                    position: "absolute",
                    top: 2,
                    right: 2,
                    width: 8,
                    height: 8,
                    borderRadius: "50%",
                    background: COLORS.danger,
                  }}
                />
              )}
            </button>
          </div>
        }
      />

      <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "6px 20px 20px" }}>
      {showManager && (
        <CharacterManager overrides={overrides} setOverrides={setOverrides} onClose={() => setShowManager(false)} />
      )}

      {showNotifs ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {notifications.length === 0 && (
            <div style={{ fontFamily: FONT_SANS, fontSize: fs(12), color: COLORS.textSecondary, padding: "10px 0" }}>
              No notifications yet.
            </div>
          )}
          {notifications.map((n) => {
            const author = getCharacterDisplay(n.charId, overrides);
            return (
              <Pressable key={n.id} onClick={() => jumpToPost(n.postId)}>
                <Card style={{ padding: 12, display: "flex", alignItems: "center", gap: 10 }}>
                  <Avatar name={author.name} color={author.color} photo={author.photo} position={author.position} zoom={author.zoom} size={30} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: FONT_SANS, fontSize: fs(12), color: COLORS.text }}>
                      <b>{author.name}</b>{" "}
                      {n.type === "celebration"
                        ? "celebrated you finishing your whole day 🎉"
                        : n.type === "like"
                        ? "liked your post ❤️"
                        : n.type === "reply"
                        ? "replied to your comment"
                        : "commented on your post"}
                    </div>
                    <div style={{ fontFamily: FONT_SANS, fontSize: fs(10), color: COLORS.textSecondary }}>
                      {formatRelativeTime(n.time)}
                    </div>
                  </div>
                  <ChevronRight size={14} color={COLORS.textSecondary} />
                </Card>
              </Pressable>
            );
          })}
        </div>
      ) : (
        <>
          <Card style={{ padding: 14, marginBottom: 14 }}>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
              <Avatar name="You" color={COLORS.accent} size={32} />
              <textarea
                value={draft}
                onChange={(e) => setDraft(e.target.value)}
                placeholder="Share something with the community…"
                rows={2}
                style={{
                  flex: 1,
                  background: "transparent",
                  border: "none",
                  outline: "none",
                  resize: "none",
                  fontFamily: FONT_SANS,
                  fontSize: fs(16),
                  color: COLORS.text,
                  boxSizing: "border-box",
                }}
              />
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8 }}>
              <button
                onClick={submitPost}
                disabled={!draft.trim()}
                style={{
                  padding: "9px 18px",
                  background: draft.trim() ? COLORS.accent : COLORS.cardBorder,
                  border: "none",
                  borderRadius: br(10),
                  color: draft.trim() ? "#0B0B0F" : COLORS.textSecondary,
                  fontFamily: FONT_SANS,
                  fontWeight: 600,
                  fontSize: fs(12),
                  cursor: draft.trim() ? "pointer" : "default",
                }}
              >
                Post
              </button>
            </div>
          </Card>

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {posts.map((p) => (
              <PostCard
                key={p.id}
                post={p}
                overrides={overrides}
                expanded={expandedPostId === p.id}
                onToggleExpand={(id) => setExpandedPostId((cur) => (cur === id ? null : id))}
                highlighted={highlightedPostId === p.id}
                onSetReaction={onSetReaction}
                onAddComment={onAddComment}
                typingCharId={typingIndicators?.[p.id]}
              />
            ))}
          </div>
        </>
      )}
      </div>
    </div>
  );
}

              + Add Songs

                  alignItems: "center",

                  padding: "8px 4px",

                    flex: 1,
                    fontFamily: FONT_SANS,
                    fontSize: fs(12),

                  style={{
                    padding: "8px 14px",
                    borderRadius: br(10),
                    border: `1px solid ${appSettings.fontFamily === key ? COLORS.accent : COLORS.cardBorder}`,
                    background: appSettings.fontFamily === key ? "rgba(200,183,158,0.15)" : "transparent",
                    color: appSettings.fontFamily === key ? COLORS.accent : COLORS.textSecondary,
                    fontFamily: p.sans,
                    fontSize: fs(12),
                    cursor: "pointer",
                  }}
                >
                  {p.label}
                </button>
              ))}
            </div>

          <SettingsSection title={`FONT SIZE — ${Math.round(appSettings.fontScale * 100)}%`}>
            <input
              type="range"
              min={0.8}
              max={1.4}
              step={0.05}
              value={appSettings.fontScale}
              onChange={(e) => set({ fontScale: parseFloat(e.target.value) })}
              style={{ width: "100%", accentColor: COLORS.accent }}
            />
          </SettingsSection>

          <SettingsSection title={`LETTER SPACING — ${appSettings.letterSpacing.toFixed(1)}px`}>
            <input
              type="range"
              min={0}
              max={3}
              step={0.25}
              value={appSettings.letterSpacing}
              onChange={(e) => set({ letterSpacing: parseFloat(e.target.value) })}
              style={{ width: "100%", accentColor: COLORS.accent }}
            />
          </SettingsSection>

          <SettingsSection title="TEXT COLOR">
            <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
              {TEXT_COLOR_SWATCHES.map((c) => (
                <button
                  key={c}
                  onClick={() => set({ textColor: c })}
                  style={{
                    width: 28,
                    height: 28,
                    borderRadius: "50%",
                    background: c,
                    border: appSettings.textColor === c ? `2px solid ${COLORS.accent}` : "2px solid transparent",
                    boxShadow: "0 0 0 1px rgba(255,255,255,0.15)",
                    cursor: "pointer",
                  }}
                />
              ))}
              <input
                type="color"
                value={appSettings.textColor}
                onChange={(e) => set({ textColor: e.target.value })}
                style={{ width: 32, height: 32, border: "none", background: "none", cursor: "pointer" }}
              />
            </div>
          </SettingsSection>

          <SettingsSection title="BOX SHAPE">
            <div style={{ display: "flex", gap: 8 }}>
              {["rounded", "square"].map((shape) => (
                <button
                  key={shape}
                  onClick={() => set({ cardShape: shape })}
                  style={{
                    flex: 1,
                    padding: "10px 0",
                    borderRadius: shape === "square" ? 4 : 12,
                    border: `1px solid ${appSettings.cardShape === shape ? COLORS.accent : COLORS.cardBorder}`,
                    background: appSettings.cardShape === shape ? "rgba(200,183,158,0.15)" : "transparent",
                    color: appSettings.cardShape === shape ? COLORS.accent : COLORS.textSecondary,
                    fontFamily: FONT_SANS,
                    fontSize: fs(12),
                    textTransform: "capitalize",
                    cursor: "pointer",
                  }}
                >
                  {shape}
                </button>
              ))}
            </div>
          </SettingsSection>
        </Card>

        <Pressable onClick={onReset}>
          <Card style={{ padding: 16, display: "flex", gap: 12, alignItems: "center", borderColor: COLORS.danger }}>
            <RotateCcw size={18} color={COLORS.danger} />
            <div style={{ fontFamily: FONT_SANS, fontSize: fs(13), color: COLORS.danger }}>
              Reset all data
            </div>
          </Card>
        </Pressable>
      </div>
    </div>
  );
}

export default function App() {
  const [scenes, setScenes] = useState(defaultScenes());
  const [journal, setJournal] = useState({});
  const [history, setHistory] = useState([]);
  const [tab, setTab] = useState("home");
  const [activeSceneId, setActiveSceneId] = useState(null);
  const [selectedDate, setSelectedDate] = useState(todayISO());
  const [loaded, setLoaded] = useState(false);
  const [appSettings, setAppSettings] = useState(DEFAULT_APP_SETTINGS);
  const [playlist, setPlaylist] = useState([]);
  const [communityPosts, setCommunityPosts] = useState([]);
  const [communityNotifications, setCommunityNotifications] = useState([]);
  const [characterOverrides, setCharacterOverrides] = useState({});
  const [showSettings, setShowSettings] = useState(false);
  const [communityTyping, setCommunityTyping] = useState({});
  const communityPostsRef = useRef([]);
  const dayRolloverDateRef = useRef(todayISO());
  const celebratedDateRef = useRef(null);
  const lastWeeklySummaryRef = useRef(null);
  useEffect(() => {
    communityPostsRef.current = communityPosts;
  }, [communityPosts]);

  // apply appearance settings to the shared style variables BEFORE rendering
  // children this pass, so every component picks up the new values immediately
  const preset = FONT_PRESETS[appSettings.fontFamily] || FONT_PRESETS.default;
  FONT_SANS = preset.sans;
  FONT_MONO = preset.mono;
  FONT_PIXEL = preset.pixel;
  FONT_SCALE = appSettings.fontScale;
  LETTER_SPACING_EXTRA = appSettings.letterSpacing;
  CARD_SHAPE = appSettings.cardShape;
  COLORS.text = appSettings.textColor;

  // lock the viewport so pinch/double-tap zoom can't happen — feels native, not like a web page
  useEffect(() => {
    let meta = document.querySelector('meta[name="viewport"]');
    const created = !meta;
    if (!meta) {
      meta = document.createElement("meta");
      meta.name = "viewport";
      document.head.appendChild(meta);
    }
    const previousContent = meta.getAttribute("content");
    meta.setAttribute(
      "content",
      "width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    );
    return () => {
      if (created) meta.remove();
      else if (previousContent) meta.setAttribute("content", previousContent);
    };
  }, []);

  // set the app icon + "add to home screen" behavior so it opens like a real installed app
  useEffect(() => {
    const created = [];

    const upsertLink = (rel, href, extraAttrs = {}) => {
      let link = document.querySelector(`link[rel="${rel}"]`);
      if (!link) {
        link = document.createElement("link");
        link.rel = rel;
        document.head.appendChild(link);
        created.push(link);
      }
      link.href = href;
      Object.entries(extraAttrs).forEach(([k, v]) => link.setAttribute(k, v));
    };
    const upsertMeta = (name, content) => {
      let meta = document.querySelector(`meta[name="${name}"]`);
      if (!meta) {
        meta = document.createElement("meta");
        meta.name = name;
        document.head.appendChild(meta);
        created.push(meta);
      }
      meta.setAttribute("content", content);
    };

    upsertLink("icon", APP_ICON_DATA_URL);
    upsertLink("apple-touch-icon", APP_ICON_DATA_URL);
    upsertMeta("apple-mobile-web-app-capable", "yes");
    upsertMeta("mobile-web-app-capable", "yes");
    upsertMeta("apple-mobile-web-app-title", "DAY//2004");
    upsertMeta("apple-mobile-web-app-status-bar-style", "black-translucent");
    upsertMeta("theme-color", COLORS.bg);
    if (document.title !== "DAY//2004") document.title = "DAY//2004";

    return () => {
      created.forEach((el) => el.remove());
    };
  }, []);

  // load persisted data
  useEffect(() => {
    (async () => {
      const s = await loadKey("day2004-scenes", null);
      const j = await loadKey("day2004-journal", {});
      const st = await loadKey("day2004-appsettings", DEFAULT_APP_SETTINGS);
      let h = await loadKey("day2004-history", null);
      if (!h) {
        h = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          h.push({ date: d.toISOString().slice(0, 10), pct: 0 });
        }
      }

      const today = todayISO();
      const lastActiveDate = await loadKey("day2004-last-active-date", null);
      let finalScenes = s || defaultScenes();
      if (lastActiveDate && lastActiveDate !== today) {
        // a new day started since we last had the app open — clear finished tasks only
        finalScenes = clearCompletedTasks(finalScenes);
        await saveKey("day2004-scenes", finalScenes);
      }
      await saveKey("day2004-last-active-date", today);
      dayRolloverDateRef.current = today;
      celebratedDateRef.current = await loadKey("day2004-celebrated-date", null);
      lastWeeklySummaryRef.current = await loadKey("day2004-last-weekly-summary", null);

      setScenes(finalScenes);
      setJournal(j);
      setHistory(h);
      setAppSettings(st || DEFAULT_APP_SETTINGS);
      const p = await loadPlaylistFromStorage();
      setPlaylist(p);

      const now = new Date();
      const storedPosts = await loadKey("day2004-community-posts", null);
      const storedNotifs = await loadKey("day2004-community-notifs", []);
      const lastSeen = await loadKey("day2004-community-lastseen", null);

      let posts, notifs;
      if (!storedPosts) {
        const seeded = seedInitialCommunity(now);
        posts = seeded.posts;
        notifs = seeded.notifications;
      } else {
        const fromDate = lastSeen ? new Date(lastSeen) : now;
        const caughtUp = catchUpCommunity(storedPosts, fromDate, now);
        posts = caughtUp.posts;
        notifs = [...caughtUp.notifications, ...storedNotifs].slice(0, 60);
      }
      setCommunityPosts(posts);
      setCommunityNotifications(notifs);
      const storedOverrides = await loadKey("day2004-community-overrides", {});
      setCharacterOverrides(storedOverrides);
      await saveKey("day2004-community-lastseen", now.toISOString());

      setLoaded(true);
    })();
  }, []);

  // if the app stays open across midnight, roll the day over live (clear finished tasks only)
  useEffect(() => {
    if (!loaded) return;
    const id = setInterval(() => {
      const today = todayISO();
      if (today !== dayRolloverDateRef.current) {
        dayRolloverDateRef.current = today;
        setScenes((prev) => {
          const next = clearCompletedTasks(prev);
          saveKey("day2004-scenes", next);
          return next;
        });
        saveKey("day2004-last-active-date", today);
      }
    }, 60000);
    return () => clearInterval(id);
  }, [loaded]);

  // keep lastSeen fresh so catch-up math stays accurate, and simulate the community "living" in real time
  useEffect(() => {
    if (!loaded) return;
    const tick = () => {
      const now = new Date();
      const result = simulationTick(communityPostsRef.current, now);
      let posts = result.posts;
      let notifications = result.notifications;

      const daysSinceSummary = lastWeeklySummaryRef.current
        ? (now - new Date(lastWeeklySummaryRef.current)) / 86400000
        : Infinity;
      if (daysSinceSummary >= 7) {
        const summary = buildWeeklySummaryPost(posts);
        if (summary) {
          posts = [summary, ...posts];
          lastWeeklySummaryRef.current = now.toISOString();
          saveKey("day2004-last-weekly-summary", now.toISOString());
        }
      }

      setCommunityPosts(posts);
      if (notifications.length) {
        setCommunityNotifications((n) => [...notifications, ...n].slice(0, 60));
      }
      saveKey("day2004-community-posts", posts);
      saveKey("day2004-community-lastseen", now.toISOString());
    };
    const id = setInterval(tick, 20000 + Math.random() * 15000);
    const onVisibility = () => {
      if (document.visibilityState === "hidden") {
        saveKey("day2004-community-lastseen", new Date().toISOString());
      }
    };
    document.addEventListener("visibilitychange", onVisibility);
    return () => {
      clearInterval(id);
      document.removeEventListener("visibilitychange", onVisibility);
    };
  }, [loaded]);

  // persist scenes + keep today's history entry live
  useEffect(() => {
    if (!loaded) return;
    saveKey("day2004-scenes", scenes);
    const totalTasks = scenes.reduce((a, s) => a + s.tasks.length, 0);
    const doneTasks = scenes.reduce((a, s) => a + s.tasks.filter((t) => t.done).length, 0);
    const pct = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;
    setHistory((h) => {
      const today = todayISO();
      const idx = h.findIndex((x) => x.date === today);
      let next;
      if (idx >= 0) {
        next = [...h];
        next[idx] = { date: today, pct };
      } else {
        next = [...h.slice(1), { date: today, pct }];
      }
      saveKey("day2004-history", next);
      return next;
    });

    if (totalTasks > 0 && doneTasks === totalTasks) {
      const today = todayISO();
      if (celebratedDateRef.current !== today) {
        celebratedDateRef.current = today;
        saveKey("day2004-celebrated-date", today);
        const [char] = pickReactorCharacters(1);
        const now = new Date();
        const celebrationPost = {
          id: uid(),
          authorId: char.id,
          time: now.toISOString(),
          content: "okay but someone finished literally everything on their list today 👑🔥 that's the energy",
          userReaction: null,
          reactions: [],
          comments: [],
        };
        setCommunityPosts((prev) => {
          const nextPosts = [celebrationPost, ...prev].slice(0, COMMUNITY_POST_CAP);
          saveKey("day2004-community-posts", nextPosts);
          return nextPosts;
        });
        setCommunityNotifications((n) => {
          const nextN = [
            { id: uid(), type: "celebration", charId: char.id, postId: celebrationPost.id, time: now.toISOString(), read: false },
            ...n,
          ].slice(0, 80);
          saveKey("day2004-community-notifs", nextN);
          return nextN;
        });
        const supporters = pickReactorCharacters(2);
        supporters.forEach((c, i) => {
          setTimeout(() => {
            setCommunityPosts((prev) => {
              const nextPosts = prev.map((p) =>
                p.id === celebrationPost.id
                  ? p.reactions.some((r) => r.charId === c.id)
                    ? p
                    : { ...p, reactions: [...p.reactions, { charId: c.id, emoji: pickReactionEmoji() }] }
                  : p
              );
              saveKey("day2004-community-posts", nextPosts);
              return nextPosts;
            });
          }, 3000 + i * 4000);
        });
      }
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [scenes, loaded]);

  useEffect(() => {
    if (loaded) saveKey("day2004-journal", journal);
  }, [journal, loaded]);

  useEffect(() => {
    if (loaded) saveKey("day2004-appsettings", appSettings);
  }, [appSettings, loaded]);

  useEffect(() => {
    if (loaded) saveKey("day2004-community-overrides", characterOverrides);
  }, [characterOverrides, loaded]);

  const updateScene = (updated) =>
    setScenes((prev) => prev.map((s) => (s.id === updated.id ? updated : s)));

  const addScene = () => {
    const name = window.prompt("Scene name?");
    if (!name) return;
    const time = window.prompt("Time range? e.g. 06:00 — 07:00", "06:00 — 07:00") || "";
    setScenes((prev) => [...prev, { id: uid(), name: name.toUpperCase(), time, tasks: [] }]);
  };

  const deleteScene = (id) => {
    setScenes((prev) => prev.filter((s) => s.id !== id));
    setActiveSceneId(null);
    setTab("scenes");
  };

  const resetAll = () => {
    if (!window.confirm("Reset all DAY//2004 data? This cannot be undone.")) return;
    setScenes(defaultScenes());
    setJournal({});
  };

  const addTracks = async (fileList) => {
    const files = Array.from(fileList || []);
    if (!files.length) return;
    const newTracks = [];
    let skippedForSize = 0;
    for (const f of files) {
      const dataUrl = await readFileAsDataURL(f);
      const approxBytes = dataUrl.length * 0.75;
      const id = uid();
      const persisted = approxBytes <= MAX_PERSISTABLE_TRACK_BYTES;
      const track = { id, name: f.name.replace(/\.[^/.]+$/, ""), url: dataUrl, persisted };
      newTracks.push(track);
      if (persisted) {
        await saveKey("day2004-track-" + id, dataUrl);
      } else {
        skippedForSize++;
      }
    }
    setPlaylist((p) => {
      const next = [...p, ...newTracks];
      savePlaylistMeta(next);
      return next;
    });
    if (skippedForSize > 0) {
      window.alert(
        `${skippedForSize} file(s) were too large to save permanently (over ~4.5MB) — they'll play now but won't be there after you reload.`
      );
    }
  };

  const removeTrack = (id) => {
    setPlaylist((p) => {
      const next = p.filter((t) => t.id !== id);
      savePlaylistMeta(next);
      return next;
    });
    deleteKey("day2004-track-" + id);
  };

  const persistCommunity = (posts, notifs) => {
    saveKey("day2004-community-posts", posts);
    if (notifs) saveKey("day2004-community-notifs", notifs.slice(0, 80));
  };

  function findMentionedCharacter(text) {
    const m = text.match(/@(\w+)/);
    if (!m) return null;
    const q = m[1].toLowerCase();
    return COMMUNITY_CHARACTERS.find((c) => (characterOverrides?.[c.id]?.name || c.name).toLowerCase() === q) || null;
  }

  // reacts to a specific piece of user text (a new post OR a new comment) with realistic, fast timing
  const scheduleUserTextReactions = (postId, text, { isNewPost, preferCharId, replyTo } = {}) => {
    const mentioned = findMentionedCharacter(text);
    const reactorCount = isNewPost ? 2 + Math.floor(Math.random() * 4) : 1 + Math.floor(Math.random() * 2);
    let reactors = pickReactorCharacters(reactorCount, preferCharId || mentioned?.id);
    if (mentioned && !reactors.some((r) => r.id === mentioned.id)) {
      reactors = [mentioned, ...reactors];
    }
    reactors.forEach((char) => {
      const isMentioned = mentioned && char.id === mentioned.id;
      const delay = isMentioned
        ? 3000 + Math.random() * 5000 // mentioned characters always respond fast
        : char.closeness === "close"
        ? 4000 + Math.random() * 8000
        : char.closeness === "friend"
        ? 8000 + Math.random() * 12000
        : 14000 + Math.random() * 16000;
      const isLike = isNewPost && !isMentioned ? Math.random() < 0.6 : false;

      // show a brief "typing..." indicator right before a comment lands
      if (!isLike) {
        const typingDelay = Math.max(500, delay - 2200);
        setTimeout(() => {
          setCommunityTyping((t) => ({ ...t, [postId]: char.id }));
        }, typingDelay);
      }

      setTimeout(() => {
        const now = new Date();
        setCommunityTyping((t) => {
          const next = { ...t };
          if (next[postId] === char.id) delete next[postId];
          return next;
        });
        setCommunityPosts((prev) => {
          const next = prev.map((p) => {
            if (p.id !== postId) return p;
            if (isLike) {
              return p.reactions.some((r) => r.charId === char.id)
                ? p
                : { ...p, reactions: [...p.reactions, { charId: char.id, emoji: pickReactionEmoji() }] };
            }
            const comment = {
              id: uid(),
              authorId: char.id,
              content: generateCommentContent(char, text),
              time: now.toISOString(),
              replyTo: replyTo || null,
            };
            return { ...p, comments: [...p.comments, comment] };
          });
          persistCommunity(next);
          return next;
        });
        setCommunityNotifications((n) => {
          const next = [
            {
              id: uid(),
              type: isLike ? "like" : isNewPost ? "comment" : "reply",
              charId: char.id,
              postId,
              time: now.toISOString(),
              read: false,
            },
            ...n,
          ].slice(0, 80);
          saveKey("day2004-community-notifs", next);
          return next;
        });
      }, delay);
    });
  };

  const communityAddUserPost = (text) => {
    const post = {
      id: uid(),
      authorId: "user",
      time: new Date().toISOString(),
      content: text,
      userReaction: null,
      reactions: [],
      comments: [],
    };
    setCommunityPosts((prev) => {
      const next = [post, ...prev].slice(0, COMMUNITY_POST_CAP);
      persistCommunity(next);
      return next;
    });
    scheduleUserTextReactions(post.id, text, { isNewPost: true });
  };

  const communitySetReaction = (postId, emoji) => {
    setCommunityPosts((prev) => {
      const next = prev.map((p) => (p.id === postId ? { ...p, userReaction: emoji } : p));
      persistCommunity(next);
      return next;
    });
  };

  const communityAddComment = (postId, text, replyTo) => {
    setCommunityPosts((prev) => {
      const target = prev.find((p) => p.id === postId);
      const repliedComment = replyTo ? target?.comments.find((c) => c.id === replyTo) : null;
      const next = prev.map((p) =>
        p.id === postId
          ? {
              ...p,
              comments: [
                ...p.comments,
                { id: uid(), authorId: "user", content: text, time: new Date().toISOString(), replyTo: replyTo || null },
              ],
            }
          : p
      );
      persistCommunity(next);
      // characters (especially whoever authored the post, or the comment being replied to) reply back —
      // keeps the thread alive instead of a single one-off reaction
      const preferCharId = repliedComment && repliedComment.authorId !== "user"
        ? repliedComment.authorId
        : target && target.authorId !== "user"
        ? target.authorId
        : null;
      scheduleUserTextReactions(postId, text, { isNewPost: false, preferCharId, replyTo: replyTo || null });
      return next;
    });
  };

  const communityMarkNotificationsRead = () => {
    setCommunityNotifications((prev) => {
      const next = prev.map((n) => ({ ...n, read: true }));
      saveKey("day2004-community-notifs", next);
      return next;
    });
  };

  const activeScene = scenes.find((s) => s.id === activeSceneId);

  let body;
  if (showSettings) {
    body = (
      <MoreScreen
        onBack={() => setShowSettings(false)}
        onReset={resetAll}
        appSettings={appSettings}
        setAppSettings={setAppSettings}
        playlist={playlist}
        addTracks={addTracks}
        removeTrack={removeTrack}
      />
    );
  } else if (activeScene) {
    body = (
      <SceneDetailScreen
        scene={activeScene}
        index={scenes.findIndex((s) => s.id === activeSceneId)}
        updateScene={updateScene}
        onBack={() => setActiveSceneId(null)}
        onDeleteScene={deleteScene}
      />
    );
  } else if (tab === "home") {
    body = (
      <HomeScreen
        scenes={scenes}
        goScene={(id) => setActiveSceneId(id)}
        journal={journal}
        setJournal={setJournal}
        appSettings={appSettings}
        setAppSettings={setAppSettings}
      />
    );
  } else if (tab === "scenes") {
    body = <ScenesScreen scenes={scenes} goScene={(id) => setActiveSceneId(id)} addScene={addScene} />;
  } else if (tab === "stats") {
    body = <StatsScreen scenes={scenes} history={history} />;
  } else if (tab === "journal") {
    body = (
      <JournalScreen
        scenes={scenes}
        journal={journal}
        setJournal={setJournal}
        history={history}
        selectedDate={selectedDate}
        setSelectedDate={setSelectedDate}
        appSettings={appSettings}
        setAppSettings={setAppSettings}
      />
    );
  } else if (tab === "community") {
    body = (
      <CommunitySection
        posts={communityPosts}
        notifications={communityNotifications}
        overrides={characterOverrides}
        setOverrides={setCharacterOverrides}
        onPost={communityAddUserPost}
        onSetReaction={communitySetReaction}
        typingIndicators={communityTyping}
        onAddComment={communityAddComment}
        onMarkNotificationsRead={communityMarkNotificationsRead}
        onOpenSettings={() => setShowSettings(true)}
      />
    );
  }

  return (
    <div
      style={{
        width: "100%",
        maxWidth: 420,
        margin: "0 auto",
        height: "100dvh",
        maxHeight: "100vh",
        background: COLORS.bg,
        display: "flex",
        flexDirection: "column",
        fontFamily: FONT_SANS,
        overflow: "hidden",
      }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&family=Silkscreen:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap');
        * { -webkit-tap-highlight-color: transparent; }
        html, body, #root { height: 100%; margin: 0; overscroll-behavior: none; touch-action: pan-y; }
        body { background: ${COLORS.bg}; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes eqBar { from { transform: scaleY(0.4); } to { transform: scaleY(1); } }
        @keyframes sqFlicker { from { opacity: 0.2; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        button { transition: transform 120ms ease, opacity 120ms ease; }
        button:active { transform: scale(0.94); opacity: 0.85; }
        .day2004-app-fade-in { animation: fadeInUp 320ms ease both; }
        .day2004-app-pop-in { animation: popIn 260ms cubic-bezier(0.34, 1.56, 0.64, 1) both; }
      `}</style>
      <div style={{ flex: 1, overflowY: "auto", overscrollBehavior: "contain" }}>{body}</div>
      {!activeScene && tab === "home" && (
        <div
          style={{
            position: "sticky",
            bottom: 0,
            paddingTop: 8,
            background: "linear-gradient(180deg, rgba(11,11,15,0) 0%, rgba(11,11,15,0.96) 35%)",
          }}
        >
          <MusicPlayer playlist={playlist} addTracks={addTracks} removeTrack={removeTrack} />
        </div>
      )}
      <BottomNav
        active={showSettings ? "community" : activeScene ? "scenes" : tab}
        onChange={(t) => {
          setActiveSceneId(null);
          setShowSettings(false);
          setTab(t);
        }}
      />
    </div>
  );
}

import { createRoot } from "react-dom/client";
createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
